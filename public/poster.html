<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metatree Lab — 宣传海报</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Inter', 'Noto Sans SC', sans-serif;
  }

  .poster {
    width: 1080px;
    height: 1350px;
    background: #000;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding: 80px 72px;
  }

  /* === Background Effects === */
  .grid-overlay {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .glow-top {
    position: absolute;
    top: -200px;
    right: -100px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(0,229,160,0.15) 0%, rgba(0,180,216,0.06) 40%, transparent 70%);
    pointer-events: none;
  }

  .glow-bottom {
    position: absolute;
    bottom: -150px;
    left: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(0,180,216,0.12) 0%, rgba(0,229,160,0.04) 40%, transparent 70%);
    pointer-events: none;
  }

  /* === Decorative Line === */
  .accent-line {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 5px;
    background: linear-gradient(90deg, #00E5A0 0%, #00B4D8 60%, transparent 100%);
  }

  /* === Logo Area === */
  .logo-area {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 60px;
    position: relative;
    z-index: 1;
  }

  .logo-area svg {
    width: 52px;
    height: 52px;
  }

  .logo-text {
    font-size: 28px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .logo-divider {
    width: 1px;
    height: 32px;
    background: rgba(255,255,255,0.2);
    margin: 0 8px;
  }

  .logo-sub {
    font-size: 16px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
  }

  /* === Section Label === */
  .section-label {
    font-family: 'Geist Mono', 'SF Mono', monospace;
    font-size: 15px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 28px;
    position: relative;
    z-index: 1;
  }

  /* === Main Headline === */
  .headline {
    position: relative;
    z-index: 1;
    margin-bottom: 48px;
  }

  .headline h1 {
    font-family: 'Noto Sans SC', 'Inter', sans-serif;
    font-size: 96px;
    font-weight: 900;
    line-height: 1.12;
    letter-spacing: -0.02em;
    color: #fff;
  }

  .headline h1 .gradient-text {
    background: linear-gradient(135deg, #00E5A0 0%, #00B4D8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* === Subtitle === */
  .subtitle {
    font-family: 'Noto Sans SC', 'Inter', sans-serif;
    font-size: 32px;
    font-weight: 400;
    line-height: 1.6;
    color: rgba(255,255,255,0.6);
    margin-bottom: 56px;
    max-width: 850px;
    position: relative;
    z-index: 1;
  }

  /* === Service Tags === */
  .service-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-bottom: 56px;
    position: relative;
    z-index: 1;
  }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 14px 28px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px;
    font-size: 22px;
    font-weight: 500;
    color: rgba(255,255,255,0.75);
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(8px);
  }

  .tag .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: linear-gradient(135deg, #00E5A0, #00B4D8);
  }

  /* === Stats === */
  .stats {
    display: flex;
    gap: 64px;
    margin-bottom: auto;
    position: relative;
    z-index: 1;
  }

  .stat-item {
    display: flex;
    flex-direction: column;
  }

  .stat-number {
    font-size: 64px;
    font-weight: 800;
    background: linear-gradient(135deg, #00E5A0 0%, #00B4D8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.1;
  }

  .stat-label {
    font-size: 20px;
    color: rgba(255,255,255,0.5);
    margin-top: 8px;
    font-weight: 500;
  }

  /* === Bottom Bar === */
  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    position: relative;
    z-index: 1;
    padding-top: 40px;
    border-top: 1px solid rgba(255,255,255,0.08);
  }

  .contact-info {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .contact-item {
    font-size: 20px;
    color: rgba(255,255,255,0.5);
    font-weight: 400;
  }

  .contact-item strong {
    color: rgba(255,255,255,0.8);
    font-weight: 600;
  }

  .qr-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .qr-box {
    width: 100px;
    height: 100px;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.03);
  }

  .qr-label {
    font-size: 14px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.06em;
  }

  .website-url {
    font-size: 26px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.02em;
  }

  /* === Decorative Nodes === */
  .node {
    position: absolute;
    border-radius: 50%;
    border: 1px solid rgba(0,229,160,0.2);
    pointer-events: none;
  }

  .node-1 {
    width: 12px; height: 12px;
    top: 320px; right: 90px;
    background: rgba(0,229,160,0.4);
  }

  .node-2 {
    width: 8px; height: 8px;
    top: 420px; right: 140px;
    background: rgba(0,180,216,0.3);
  }

  .node-3 {
    width: 6px; height: 6px;
    top: 370px; right: 200px;
    background: rgba(0,229,160,0.25);
  }

  .connection-line {
    position: absolute;
    top: 326px;
    right: 102px;
    width: 100px;
    height: 100px;
    pointer-events: none;
  }

  .connection-line line {
    stroke: rgba(0,229,160,0.1);
    stroke-width: 1;
  }
</style>
</head>
<body>

<div class="poster">
  <!-- Background effects -->
  <div class="grid-overlay"></div>
  <div class="glow-top"></div>
  <div class="glow-bottom"></div>
  <div class="accent-line"></div>

  <!-- Decorative nodes -->
  <div class="node node-1"></div>
  <div class="node node-2"></div>
  <div class="node node-3"></div>
  <svg class="connection-line" viewBox="0 0 100 100">
    <line x1="0" y1="0" x2="50" y2="95" />
    <line x1="0" y1="0" x2="98" y2="50" />
    <line x1="50" y1="95" x2="98" y2="50" />
  </svg>

  <!-- Logo -->
  <div class="logo-area">
    <svg width="52" height="52" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="favGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" stop-color="#00E5A0" />
          <stop offset="100%" stop-color="#00B4D8" />
        </linearGradient>
      </defs>
      <path d="M5 25V7L16 17L27 7V25" stroke="url(#favGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="5" cy="7" r="3.5" fill="url(#favGrad)" />
      <circle cx="27" cy="7" r="3.5" fill="url(#favGrad)" />
      <circle cx="16" cy="17" r="3.5" fill="url(#favGrad)" />
    </svg>
    <span class="logo-text">Metatree Lab</span>
    <div class="logo-divider"></div>
    <span class="logo-sub">Digital Studio</span>
  </div>

  <!-- Section Label -->
  <div class="section-label">/ AI 赋能 · 降本增效</div>

  <!-- Headline -->
  <div class="headline">
    <h1>
      让 AI 真正<br>
      <span class="gradient-text">落地你的业务</span>
    </h1>
  </div>

  <!-- Subtitle -->
  <div class="subtitle">
    战略咨询 · 流程自动化 · 团队培训 · 定制 AI 系统<br>
    几天交付，不是几个月。
  </div>

  <!-- Service Tags -->
  <div class="service-tags">
    <div class="tag"><span class="dot"></span>AI 定制开发</div>
    <div class="tag"><span class="dot"></span>团队 AI 落地</div>
    <div class="tag"><span class="dot"></span>房产营销</div>
    <div class="tag"><span class="dot"></span>流程自动化</div>
    <div class="tag"><span class="dot"></span>智能客服</div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-item">
      <span class="stat-number">50+</span>
      <span class="stat-label">企业客户</span>
    </div>
    <div class="stat-item">
      <span class="stat-number">5+</span>
      <span class="stat-label">年行业经验</span>
    </div>
    <div class="stat-item">
      <span class="stat-number">1000+</span>
      <span class="stat-label">AI 培训学员</span>
    </div>
  </div>

  <!-- Bottom Bar -->
  <div class="bottom-bar">
    <div class="contact-info">
      <div class="contact-item"><strong>metatreelab.ai</strong></div>
      <div class="contact-item">hello@jiangren.com.au</div>
      <div class="contact-item">+61 421 672 555</div>
      <div class="contact-item" style="margin-top: 4px; font-size: 16px; color: rgba(255,255,255,0.3);">Brisbane · Melbourne · Adelaide</div>
    </div>
    <div class="qr-placeholder">
      <div class="qr-box">QR Code</div>
      <span class="qr-label">扫码咨询</span>
    </div>
  </div>
</div>

</body>
</html>
